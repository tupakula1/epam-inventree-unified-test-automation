[pytest]
# ─── Test Discovery ───────────────────────────────────────────────────────────
# Runtime environment values (URL/browser/timeouts) come from config/settings.py
# which reads .env + config/environments.yml globally.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
norecursedirs = _legacy

# ─── BDD ──────────────────────────────────────────────────────────────────────
bdd_features_base_dir = features

# ─── Output ───────────────────────────────────────────────────────────────────
addopts =
    --strict-markers
    --tb=short
    -v
    --html=reports/report.html
    --self-contained-html
    --screenshot=only-on-failure
    --output=screenshots

# ─── Timeouts ─────────────────────────────────────────────────────────────────
timeout = 60

# ─── Markers ──────────────────────────────────────────────────────────────────
markers =
    ui: UI / browser tests
    api: API tests
    docs: Documentation endpoint tests
    smoke: Smoke tests — fast, critical path
    regression: Full regression suite
    positive: Positive / happy-path scenarios
    negative: Negative / error scenarios
    boundary: Boundary-value tests
    crud: Create / Read / Update / Delete tests
    part: Part module tests
    category: Category module tests
    bdd: Gherkin / pytest-bdd scenarios
    legacy_non_bdd: Retired non-BDD tests kept only for reference
    stock: Stock module tests
    revision: Part revision tests
    bom: Bill-of-Materials tests
    parameters: Part parameter tests
    import: Import workflow tests
    cross_functional: End-to-end cross-module workflow tests
    slow: Tests expected to run longer than 30s

# ─── Logging ──────────────────────────────────────────────────────────────────
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(name)s — %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
log_file = logs/test_run.log
log_file_level = DEBUG
